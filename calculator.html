<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간단한 계산기</title>
    <style>
        /* 전체 페이지 스타일 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        /* 계산기 전체 컨테이너 */
        .calculator {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 320px;
        }

        /* 계산기 제목 */
        .calculator h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }

        /* 입력창 (화면에 보이는 숫자) */
        #display {
            width: 100%;
            padding: 15px;
            font-size: 2em;
            border: 2px solid #667eea;
            border-radius: 10px;
            text-align: right;
            margin-bottom: 20px;
            box-sizing: border-box;
            background: #f5f5f5;
        }

        /* 버튼을 담을 그리드 레이아웃 */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        /* 모든 버튼의 공통 스타일 11111*/
        button {
            padding: 20px;
            font-size: 1.5em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

        /* 숫자 버튼 스타일 (0-9) */
        .btn-number {
            background: #f0f0f0;
            color: #333;
        }

        .btn-number:hover {
            background: #e0e0e0;
            transform: scale(1.05);
        }

        /* 연산자 버튼 스타일 (+, -, *, /) */
        .btn-operator {
            background: #667eea;
            color: white;
        }

        .btn-operator:hover {
            background: #5568d3;
            transform: scale(1.05);
        }

        /* 같음 버튼 스타일 (=) */
        .btn-equals {
            background: #48bb78;
            color: white;
            grid-column: span 2;
        }

        .btn-equals:hover {
            background: #38a169;
            transform: scale(1.05);
        }

        /* 리셋 버튼 스타일 (C) */
        .btn-clear {
            background: #f56565;
            color: white;
            grid-column: span 2;
        }

        .btn-clear:hover {
            background: #e53e3e;
            transform: scale(1.05);
        }

        /* 소수점 버튼 스타일 */
        .btn-decimal {
            background: #f0f0f0;
            color: #333;
        }

        .btn-decimal:hover {
            background: #e0e0e0;
            transform: scale(1.05);
        }

        /* 버튼 클릭시 효과 */
        button:active {
            transform: scale(0.95);
        }

        /* 탭 바 스타일 */
        .tab-bar {
            display: flex;
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #667eea;
        }

        /* 탭 버튼 기본 스타일 */
        .tab-btn {
            flex: 1;
            padding: 12px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            cursor: pointer;
            background: white;
            color: #667eea;
            transition: 0.2s;
        }

        .tab-btn:hover {
            background: #f0f0f0;
        }

        /* 활성 탭 버튼 */
        .tab-btn.active {
            background: #667eea;
            color: white;
        }

        /* 탭 콘텐츠 */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 백분율 섹션 */
        .percent-section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
            margin: 0 0 4px 0;
        }

        .section-desc {
            font-size: 0.85em;
            color: #888;
            margin: 0 0 14px 0;
        }

        /* 입력 그룹 */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 14px;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 백분율 입력 필드 */
        .input-row input[type="number"] {
            flex: 1;
            padding: 10px 12px;
            font-size: 1.1em;
            border: 2px solid #667eea;
            border-radius: 8px;
            box-sizing: border-box;
            text-align: right;
            /* 숫자 스피너 숨기기 */
            -moz-appearance: textfield;
        }

        .input-row input[type="number"]::-webkit-outer-spin-button,
        .input-row input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .input-label {
            font-size: 0.95em;
            color: #555;
            white-space: nowrap;
            min-width: 36px;
        }

        /* 계산 버튼 */
        .btn-percent-calc {
            width: 100%;
            padding: 14px;
            font-size: 1.2em;
            font-weight: bold;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 14px;
        }

        .btn-percent-calc:hover {
            background: #5568d3;
            transform: scale(1.02);
        }

        .btn-percent-calc:active {
            transform: scale(0.97);
        }

        /* 결과 박스 */
        .result-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: 0.2s;
            min-height: 50px;
        }

        .result-box.has-result {
            background: #f0fff4;
            border-color: #48bb78;
        }

        .result-box.has-error {
            background: #fff5f5;
            border-color: #f56565;
        }

        .result-label {
            font-size: 0.85em;
            color: #888;
        }

        .result-value {
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
        }

        .result-box.has-result .result-value {
            color: #2f855a;
        }

        .result-box.has-error .result-value {
            color: #c53030;
            font-size: 0.9em;
        }

        /* 구분선 */
        .section-divider {
            border: none;
            border-top: 1px solid #e0e0e0;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <!-- 탭 바 -->
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('calc')">계산기</button>
            <button class="tab-btn" onclick="switchTab('percent')">백분율</button>
        </div>

        <!-- 계산기 탭 -->
        <div class="tab-content active" id="tab-calc">
            <!-- 계산 결과를 보여주는 화면 -->
            <input type="text" id="display" value="0" readonly>

            <!-- 계산기 버튼들 -->
            <div class="buttons">
                <!-- 첫 번째 줄: C 버튼과 나누기 버튼 -->
                <button class="btn-clear" onclick="clearDisplay()">C</button>
                <button class="btn-operator" onclick="appendOperator('/')">÷</button>
                <button class="btn-operator" onclick="appendOperator('*')">×</button>

                <!-- 7, 8, 9 버튼 -->
                <button class="btn-number" onclick="appendNumber('7')">7</button>
                <button class="btn-number" onclick="appendNumber('8')">8</button>
                <button class="btn-number" onclick="appendNumber('9')">9</button>
                <button class="btn-operator" onclick="appendOperator('-')">−</button>

                <!-- 4, 5, 6 버튼 -->
                <button class="btn-number" onclick="appendNumber('4')">4</button>
                <button class="btn-number" onclick="appendNumber('5')">5</button>
                <button class="btn-number" onclick="appendNumber('6')">6</button>
                <button class="btn-operator" onclick="appendOperator('+')">+</button>

                <!-- 1, 2, 3 버튼 -->
                <button class="btn-number" onclick="appendNumber('1')">1</button>
                <button class="btn-number" onclick="appendNumber('2')">2</button>
                <button class="btn-number" onclick="appendNumber('3')">3</button>
                <button class="btn-equals" onclick="calculate()">=</button>

                <!-- 0 버튼과 소수점 버튼 -->
                <button class="btn-number" onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
                <button class="btn-decimal" onclick="appendNumber('.')">.</button>
            </div>
        </div>

        <!-- 백분율 탭 -->
        <div class="tab-content" id="tab-percent">
            <!-- 기능 1: 금액 계산 -->
            <div class="percent-section">
                <p class="section-title">금액 계산</p>
                <p class="section-desc">총액의 몇 %는 얼마인가요?</p>
                <div class="input-group">
                    <div class="input-row">
                        <input type="number" id="total-for-amount" placeholder="총액" min="0" inputmode="decimal">
                        <span class="input-label">원의</span>
                    </div>
                    <div class="input-row">
                        <input type="number" id="percent-rate" placeholder="%" min="0" inputmode="decimal">
                        <span class="input-label">%</span>
                    </div>
                </div>
                <button class="btn-percent-calc" onclick="calcAmount()">= 계산하기</button>
                <div class="result-box" id="result-amount">
                    <span class="result-label">결과</span>
                    <span class="result-value" id="result-amount-value">-</span>
                </div>
            </div>

            <hr class="section-divider">

            <!-- 기능 2: 비율 계산 -->
            <div class="percent-section">
                <p class="section-title">비율 계산</p>
                <p class="section-desc">얼마는 총액의 몇 %인가요?</p>
                <div class="input-group">
                    <div class="input-row">
                        <input type="number" id="total-for-ratio" placeholder="총액" min="0" inputmode="decimal">
                        <span class="input-label">원에서</span>
                    </div>
                    <div class="input-row">
                        <input type="number" id="part-amount" placeholder="부분금액" min="0" inputmode="decimal">
                        <span class="input-label">원은</span>
                    </div>
                </div>
                <button class="btn-percent-calc" onclick="calcRatio()">= 계산하기</button>
                <div class="result-box" id="result-ratio">
                    <span class="result-label">결과</span>
                    <span class="result-value" id="result-ratio-value">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== 계산기 탭 관련 변수 =====
        let display = document.getElementById('display');
        let previousValue = '';
        let operator = null;
        let shouldResetDisplay = false;
        // 현재 활성 탭 ('calc' 또는 'percent')
        let activeTab = 'calc';

        // 숫자 버튼을 클릭했을 때 실행되는 함수
        function appendNumber(number) {
            // 만약 새로운 계산을 시작해야 하면 화면을 초기화
            if (shouldResetDisplay) {
                display.value = number;
                shouldResetDisplay = false;
            } else {
                // 그렇지 않으면 이미 있는 숫자 뒤에 새로운 숫자를 추가
                display.value = display.value === '0' ? number : display.value + number;
            }
        }

        // 연산자 버튼을 클릭했을 때 실행되는 함수 (+, -, *, /)
        function appendOperator(op) {
            // 현재 화면의 값을 이전 값으로 저장
            previousValue = display.value;
            // 선택된 연산자를 저장
            operator = op;
            // 다음 숫자 입력시 화면을 초기화하도록 설정
            shouldResetDisplay = true;
        }

        // = 버튼을 클릭했을 때 실행되는 함수 (실제 계산 수행)
        function calculate() {
            // 현재 화면의 값 (두 번째 수)
            let currentValue = display.value;

            // 이전 값이나 연산자가 없으면 실행하지 않음
            if (previousValue === '' || operator === null) {
                return;
            }

            // 숫자로 변환 (문자열 "5" → 숫자 5)
            let prev = parseFloat(previousValue);
            let current = parseFloat(currentValue);
            let result = 0;

            // 선택된 연산자에 따라 다른 계산 수행
            switch(operator) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    // 0으로 나누면 오류 메시지 표시
                    if (current === 0) {
                        display.value = '0으로 나눌 수 없습니다';
                        previousValue = '';
                        operator = null;
                        shouldResetDisplay = true;
                        return;
                    }
                    result = prev / current;
                    break;
            }

            // 계산 결과를 화면에 표시 (소수점 이하 10자리까지만 표시)
            display.value = Math.round(result * 10000000000) / 10000000000;

            // 변수 초기화
            previousValue = '';
            operator = null;
            // 다음 숫자 입력시 화면을 초기화하도록 설정
            shouldResetDisplay = true;
        }

        // C 버튼을 클릭했을 때 실행되는 함수 (모든 값을 초기화)
        function clearDisplay() {
            display.value = '0';
            previousValue = '';
            operator = null;
            shouldResetDisplay = false;
        }

        // ===== 탭 전환 함수 =====
        function switchTab(tabName) {
            // 이전 탭과 버튼 비활성화
            document.getElementById('tab-calc').classList.remove('active');
            document.getElementById('tab-percent').classList.remove('active');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            // 새 탭과 버튼 활성화
            document.getElementById('tab-' + tabName).classList.add('active');
            event.target.classList.add('active');

            // 활성 탭 변수 업데이트
            activeTab = tabName;

            // 백분율 탭에서 계산기 탭으로 갈 때 입력 필드 초기화 (선택사항)
            // 여기서는 입력값을 유지하는 것으로 설정했습니다
        }

        // ===== 백분율 계산 함수 =====
        // 입력값 검증 함수
        function validatePercentInput(value, fieldName) {
            if (value.trim() === '') {
                return { valid: false, num: 0, error: fieldName + '을(를) 입력해주세요' };
            }
            const num = parseFloat(value);
            if (isNaN(num)) {
                return { valid: false, num: 0, error: '숫자만 입력 가능합니다' };
            }
            if (num < 0) {
                return { valid: false, num: 0, error: '0 이상의 값을 입력해주세요' };
            }
            return { valid: true, num: num, error: '' };
        }

        // 결과 박스 업데이트 함수
        function showPercentResult(boxId, valueId, text, isError) {
            const box = document.getElementById(boxId);
            const value = document.getElementById(valueId);

            box.classList.remove('has-result', 'has-error');
            value.textContent = text;

            if (isError) {
                box.classList.add('has-error');
            } else {
                box.classList.add('has-result');
            }
        }

        // 금액 계산 함수 (총액의 몇%는 얼마?)
        function calcAmount() {
            const totalInput = document.getElementById('total-for-amount').value;
            const percentInput = document.getElementById('percent-rate').value;

            // 총액 검증
            const totalValidation = validatePercentInput(totalInput, '총액');
            if (!totalValidation.valid) {
                showPercentResult('result-amount', 'result-amount-value', totalValidation.error, true);
                return;
            }

            // % 검증
            const percentValidation = validatePercentInput(percentInput, '%');
            if (!percentValidation.valid) {
                showPercentResult('result-amount', 'result-amount-value', percentValidation.error, true);
                return;
            }

            // 계산: 총액 × % / 100
            const result = totalValidation.num * percentValidation.num / 100;
            // 천 단위 구분 형식으로 표시
            const formattedResult = result.toLocaleString('ko-KR', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            });

            showPercentResult('result-amount', 'result-amount-value', formattedResult + ' 원', false);
        }

        // 비율 계산 함수 (얼마는 총액의 몇%?)
        function calcRatio() {
            const totalInput = document.getElementById('total-for-ratio').value;
            const partInput = document.getElementById('part-amount').value;

            // 총액 검증
            const totalValidation = validatePercentInput(totalInput, '총액');
            if (!totalValidation.valid) {
                showPercentResult('result-ratio', 'result-ratio-value', totalValidation.error, true);
                return;
            }

            // 총액이 0이 아닌지 확인
            if (totalValidation.num === 0) {
                showPercentResult('result-ratio', 'result-ratio-value', '총액은 0이 될 수 없습니다', true);
                return;
            }

            // 부분금액 검증
            const partValidation = validatePercentInput(partInput, '부분금액');
            if (!partValidation.valid) {
                showPercentResult('result-ratio', 'result-ratio-value', partValidation.error, true);
                return;
            }

            // 계산: (부분금액 / 총액) × 100
            const result = (partValidation.num / totalValidation.num) * 100;
            // 소수점 이하 2자리까지 표시
            const formattedResult = result.toFixed(2);

            showPercentResult('result-ratio', 'result-ratio-value', formattedResult + ' %', false);
        }

        // ===== 키보드 입력 핸들러 (계산기 탭에서만 동작) =====
        document.addEventListener('keydown', function(event) {
            // 백분율 탭이 활성화되어 있으면 계산기 키보드 단축키 무시
            if (activeTab !== 'calc') {
                return;
            }

            const key = event.key;

            // 숫자 키 (0-9)
            if (key >= '0' && key <= '9') {
                appendNumber(key);
            }
            // 연산자 키
            else if (key === '+' || key === '-' || key === '*' || key === '/') {
                appendOperator(key);
            }
            // Enter 키 또는 = 키를 누르면 계산
            else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                calculate();
            }
            // Backspace 키를 누르면 마지막 숫자 삭제
            else if (key === 'Backspace') {
                event.preventDefault();
                display.value = display.value.slice(0, -1) || '0';
            }
            // Escape 키를 누르면 초기화
            else if (key === 'Escape') {
                clearDisplay();
            }
        });

        // 백분율 탭에서 Enter 키 지원
        document.addEventListener('keydown', function(event) {
            if (activeTab !== 'percent') return;

            if (event.key === 'Enter') {
                event.preventDefault();
                // 현재 포커스된 입력 필드 확인
                const focusedId = document.activeElement.id;

                if (focusedId === 'total-for-amount' || focusedId === 'percent-rate') {
                    calcAmount();
                } else if (focusedId === 'total-for-ratio' || focusedId === 'part-amount') {
                    calcRatio();
                }
            }
        });
    </script>
</body>
</html>
